version: v0.3.0

listeners:
  - type: model
    name: do_multi_model
    port: 12000

model_providers:
  # Creative / General → Llama 3.3 70B (fast, cheap)
  - model: digitalocean/llama3.3-70b-instruct
    base_url: https://inference.do-ai.run
    provider_interface: openai
    access_key: $DO_MODEL_ACCESS_KEY
    default: true

  # Reasoning / Analysis → DeepSeek R1 Distill 70B
  - model: digitalocean/deepseek-r1-distill-llama-70b
    base_url: https://inference.do-ai.run
    provider_interface: openai
    access_key: $DO_MODEL_ACCESS_KEY

  # Premium — Anthropic Claude Opus 4.6 via DO pass-through
  - model: digitalocean/anthropic-claude-opus-4.6
    base_url: https://inference.do-ai.run
    provider_interface: openai
    access_key: $DO_MODEL_ACCESS_KEY
